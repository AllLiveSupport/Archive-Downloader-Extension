<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Downloader</title>
    <link rel="stylesheet" href="popup.css">

    <!-- Scripts -->
    <script src="globals.js"></script>
    <script src="popup-dom.js"></script>
    <script src="download.js"></script>
    <script src="popup.js"></script>
</head>

<body>

    <!-- Top Bar / Header -->
    <header class="app-header">
        <div class="logo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            <span>Archive<strong>Downloader</strong></span>
        </div>
        <div class="header-actions">
            <!-- <button id="themeToggle" class="icon-btn">🌙</button> -->
            <button id="closeBtn" class="icon-btn" title="Close">✕</button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="searchView">

        <!-- Status Bar -->
        <div class="status-bar">
            <div id="statusText" class="status-text">Ready to scan</div>
            <div class="scan-controls">
                <button id="stopScanBtn" class="btn btn-sm btn-secondary">Stop Scan</button>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar-bg">
                <div id="progressBar" class="progress-bar-fill" style="width: 0%"></div>
            </div>
            <div class="progress-labels">
                <span id="progressCount">0 found</span>
                <span id="progressTotal"></span>
            </div>
        </div>

        <!-- Format Filters (Chips) -->
        <div class="filters-section">
            <span class="section-label">Formats</span>
            <div id="extList" class="chips-container">
                <!-- Chips injected here -->
                <div class="chip skeleton"></div>
                <div class="chip skeleton"></div>
                <div class="chip skeleton"></div>
            </div>
        </div>

        <!-- Item List -->
        <div class="list-section">
            <div class="list-header">
                <span id="listTitle">Files</span>
                <div class="list-actions">
                    <button id="selectAllBtn" class="text-btn">All</button>
                    <button id="selectNoneBtn" class="text-btn">None</button>
                </div>
            </div>
            <div id="downloadsListWrapper" class="items-list custom-scrollbar">
                <!-- Items injected here -->
            </div>
        </div>

    </main>

    <!-- Download View Overlay -->
    <main id="downloadsView" class="view-overlay" hidden>
        <div class="view-header">
            <h2>Downloading...</h2>
            <button id="newSearchBtn" class="btn btn-sm btn-outline">Back</button>
        </div>

        <!-- Error Actions (Hidden by default) -->
        <div id="errorActions" class="error-actions" style="display:none; padding: 0 16px 10px 16px; gap: 8px;">
            <button id="retryFailedBtn" class="btn btn-sm btn-primary" style="background-color: var(--primary);">Retry
                Failed</button>
            <button id="exportErrorsBtn" class="btn btn-sm btn-secondary"
                style="background-color: #ef4444; color: white;">Export Errors (TXT)</button>
        </div>

        <div id="downloadProgressList" class="items-list custom-scrollbar">
            <!-- Download items injected here -->
        </div>
        <div id="downloadCompleted" class="completion-banner" hidden>
            <span>✨ All downloads completed!</span>
        </div>
    </main>

    <!-- Error/Notice View -->
    <div id="badUrl" class="notice-overlay" hidden>
        <div class="notice-card">
            <div class="notice-icon">ℹ️</div>
            <h3>Collection Required</h3>
            <p>Please navigate to an Archive.org collection or item page to use this tool.</p>
            <a href="https://archive.org/details/ares_magazine" id="aresExampleLink" class="btn btn-primary">Try
                Example</a>
        </div>
    </div>

    <!-- Footer Actions -->
    <footer class="app-footer">
        <div id="selectionInfo" class="selection-info">0 selected</div>
        <div class="footer-buttons">
            <button id="createTxtBtn" class="btn btn-secondary">
                <span>Export TXT</span>
            </button>
            <button id="startDownload" class="btn btn-primary" disabled>
                <span>Download</span>
            </button>
        </div>
        <div class="social-links"
            style="display: flex; justify-content: center; gap: 15px; margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--border);">
            <a href="https://github.com/AllLiveSupport" target="_blank" title="GitHub"
                style="color: var(--text-main); opacity: 0.7; transition: opacity 0.2s;">
                <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor">
                    <path
                        d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z">
                    </path>
                </svg>
            </a>
            <a href="https://buymeacoffee.com/alllivesupport" target="_blank" title="Buy Me A Coffee"
                style="color: #FFDD00; opacity: 0.9; transition: opacity 0.2s;">
                <svg height="20" width="20" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M20.216 6.415l-.132-.666c-.119-.596-.388-1.163-.78-1.645-.39-.48-.885-.85-1.436-1.073l-1.637-.665c-.687-.278-1.41-.336-2.126-.17l-1.077.25c-.244.057-.46.196-.61.396-.15.2-.214.453-.18.707l.21 1.58c-4.406.878-7.557 4.77-7.557 9.29 0 5.232 4.093 9.473 9.142 9.473 5.05 0 9.143-4.24 9.143-9.472 0-.48-.04-.96-.11-1.43l3.39-1.376c.48-.195.842-.553 1.012-1 .17-.446.16-.94-.027-1.385l-.65-1.55c-.21-.5-.595-.9-1.078-1.127-.482-.228-1.02-.244-1.513-.046l-3.327 1.348zM5.99 14.128c0-4.04 3.037-7.393 6.942-7.854l.09.68c.036.27.09.535.158.794l.445 1.706c.15.58.468 1.1.916 1.51.45.41.996.69 1.59.814l.87.18c-.28 1.226-1.29 1.838-2.6 1.88-.22.01-.42.12-.55.32-.132.19-.158.43-.07.65.517 1.285 1.765 2.126 3.15 2.126h.02c.045 0 .09-.002.135-.006.223-.02.44.056.59.21.15.153.22.373.19.593-.153 1.096-.64 2.105-1.39 2.91C12.9 20.36 9.92 18.59 7.91 15.6c-.63-.94-.96-1.74-1.92-1.472z">
                    </path>
                </svg>
            </a>
        </div>
    </footer>

</body>

</html>
